<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crible — fundamental screener</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️</text></svg>" />
    <script>
      // Pre-paint theme resolution (mirrors src/theme.ts) — no flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("crible-theme");
          var light =
            stored === "light" ||
            (!stored && matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.dataset.theme = light ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
