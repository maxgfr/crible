<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crible — fundamental screener</title>
    <!-- the sieve wordmark glyph, in forge amber — the tool's own mark -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23e5944a%22><circle cx=%2212%22 cy=%2212%22 r=%229%22 stroke-width=%221.75%22/><g stroke-width=%221.4%22 stroke-dasharray=%223 2.4%22><line x1=%224.5%22 y1=%2215%22 x2=%2215%22 y2=%224.5%22/><line x1=%227%22 y1=%2219%22 x2=%2219%22 y2=%227%22/><line x1=%2211%22 y1=%2221%22 x2=%2221%22 y2=%2211%22/></g></svg>" />
    <script>
      // Pre-paint theme resolution (mirrors src/theme.ts) — no flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("crible-theme");
          var light =
            stored === "light" ||
            (!stored && matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.dataset.theme = light ? "light" : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
