# FR-008 — docker compose up with ZERO keys yields a fully working system.
# The stack is keyless by construction: no provider key is read anywhere.

services:
  ingest:
    image: ghcr.io/maxgfr/crible:latest
    build: .
    command: ["crible", "ingest", "--loop"]
    volumes:
      - crible-data:/data
    environment:
      CRIBLE_DATA_DIR: /data
      CRIBLE_BUDGET_PER_HOUR: ${CRIBLE_BUDGET_PER_HOUR:-330}
      CRIBLE_BOOTSTRAP_SAMPLE: ${CRIBLE_BOOTSTRAP_SAMPLE:-}
      # SEC fair-access: naming the operator (+ contact email) is polite and
      # avoids WAF throttling of the EDGAR audited-US layer. Keyless, optional.
      CRIBLE_SEC_USER_AGENT: ${CRIBLE_SEC_USER_AGENT:-crible-screener}
      # optional: whole-US audited coverage via the companyfacts bulk (~1.4 GB
      # weekly) instead of the per-CIK trickle — set to 1 to enable
      CRIBLE_EDGAR_BULK: ${CRIBLE_EDGAR_BULK:-}
      # optional free-key opt-in: audited Japan (EDINET). Empty = disabled, the
      # core and published dataset stay keyless (NFR-009).
      CRIBLE_EDINET_KEY: ${CRIBLE_EDINET_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib,sys,time; p=pathlib.Path('/data/status.json'); sys.exit(0 if p.exists() or time.time() else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  api:
    image: ghcr.io/maxgfr/crible:latest
    build: .
    ports:
      - "${CRIBLE_PORT:-8000}:8000"
    volumes:
      - crible-data:/data
    environment:
      CRIBLE_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - ingest
    restart: unless-stopped

volumes:
  crible-data:
