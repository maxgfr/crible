name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead.
      placeholder: |
        1. Ran `crible screen "piotroski_f >= 7"` …
        2. Expected rows, got …
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where?
      options:
        - Self-hosted (docker compose)
        - Self-hosted (uv / local dev)
        - Hosted site (maxgfr.github.io/crible)
        - CLI
        - API
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0, or `git rev-parse --short HEAD`
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant terminal output, browser console, or `crible status`.
      render: shell
  - type: checkboxes
    id: zero-key
    attributes:
      label: Environment
      options:
        - label: I run keyless (no third-party provider plugin configured)
