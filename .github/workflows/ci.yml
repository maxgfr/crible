name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    # NFR-009 zero-key gate: NO provider keys are configured in this job —
    # the entire suite must pass with an empty environment.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync
      - run: uv run pytest -q
        env:
          # NFR-008 bounds are normative for the reference machine; shared
          # runners get an explicit 3× budget instead of a weakened contract
          CRIBLE_BENCH_FACTOR: "3"
      - run: uv run ruff check src tests

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm --prefix ui install --no-audit --no-fund
      - run: npm --prefix ui run test -- --run
      - run: npm --prefix ui run build
      # the Pages static build must never rot
      - run: npm --prefix ui run build
        env:
          VITE_DATA_MODE: static
          VITE_BASE: /crible/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      # Zero-key smoke on the REAL image, no Yahoo spend: the CLI runs,
      # bootstrap pulls the published open dataset, the API screens it.
      # (The full crawl E2E stays manual/nightly: it spends request budget.)
      - name: Compose smoke — CLI + bootstrap + API screen (zero keys)
        run: |
          set -euo pipefail
          docker compose run --rm --no-deps api crible --help > /dev/null
          docker compose run --rm --no-deps api crible bootstrap
          docker compose run --rm --no-deps api crible screen "piotroski_f >= 7" --limit 5
          docker compose up -d --no-deps api
          for i in $(seq 1 30); do curl -fsS http://localhost:8000/healthz > /dev/null && break; sleep 2; done
          total=$(curl -fsS -X POST http://localhost:8000/api/screen \
            -H 'Content-Type: application/json' -d '{"query":"piotroski_f >= 7"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["total"])')
          echo "screen total=$total"; test "$total" -gt 0
          curl -fsS http://localhost:8000/api/fields | python3 -c '
          import json, sys
          fields = json.load(sys.stdin)
          assert any(f["name"] == "price_to_earnings_ratio" for f in fields), "P/E missing"
          print(len(fields), "filterable fields")'
          docker compose down -v
