# Nightly dataset refresh — keyless core + ONE free-key opt-in (EDINET,
# audited Japan, PDL1.0 with attribution): the run degrades to keyless when
# the CRIBLE_EDINET_KEY secret is absent, and the test suite still passes
# with an empty environment (NFR-009). Restores the last-good dataset from the rolling
# data-latest release, runs one bounded refresh pass (FinanceDatabase
# universe + Yahoo fundamentals/prices + ESEF audited statements via a fresh
# GLEIF mapping + EDGAR audited US statements), then publishes back as
# release assets. Any failure — including the export-site min-symbols gate —
# aborts BEFORE the publish, so the hosted site always keeps the last-good
# data. No data ever travels in git: main stays code-only.

name: refresh-data

on:
  schedule:
    # GitHub schedules drift ~3h under load (observed 05:09 for a 02:17
    # cron): start just before midnight UTC so even a slow ~4h run has
    # published before EU market open. One nightly is enough — every source
    # (SEC bulk, filings.xbrl.org, FinanceDatabase) rebuilds daily at most.
    - cron: "47 23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write # the failure beacon opens/bumps a labeled issue

# No cancel-in-progress: a running refresh is never killed. Nothing else may
# share this group — a second member's queued run would evict a PENDING
# nightly (GitHub keeps only one pending run per group; bit us 2026-07-15).
concurrency:
  group: refresh-data

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      CRIBLE_DATA_DIR: data
      # SEC fair-access: a declared operator + contact email. The UA must NOT
      # contain a URL — the SEC Akamai WAF 403s any User-Agent with an http(s)
      # link, which silently killed the whole EDGAR layer (diagnosed 2026-07-14).
      CRIBLE_SEC_USER_AGENT: "crible maxgolfier@gmail.com"
      # audited Japan (EDINET) — free-key opt-in, PDL1.0 attribution in
      # DATA-SOURCES.md; empty/absent secret = the stage self-skips
      CRIBLE_EDINET_KEY: ${{ secrets.CRIBLE_EDINET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore last-good data from the data-latest release
        run: |
          if curl -fsSL --retry 3 -o /tmp/crible-data.tar.gz \
              "https://github.com/${{ github.repository }}/releases/download/data-latest/crible-data.tar.gz"; then
            tar -xzf /tmp/crible-data.tar.gz
            echo "restored last-good data/"
          else
            echo "no data-latest release yet — first refresh starts from scratch"
          fi

      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync

      - name: Download the GLEIF ISIN→LEI mapping (never committed)
        continue-on-error: true # the ESEF cycle self-skips without it
        run: |
          mkdir -p data
          curl -fsSL --retry 3 -o data/isin-lei.zip \
            https://mapping.gleif.org/api/v2/isin-lei/latest/download

      # the worldwide price series come from the yfinance crawl below (Europe-
      # first) + the optional Stooq worldwide dump (import-prices workflow);
      # this weekly step just tops up US listings from the HuggingFace dump
      - name: Weekly HuggingFace price dump (US listings — series + distillate)
        continue-on-error: true # prices are an enrichment, never a gate
        run: uv run crible import-prices huggingface --max-age-days 6

      # BEFORE the refresh: the crawl's dump-covered deferral reads this
      # store, so fresh coverage must land first (assumed-risk tier, like
      # Stooq — see docs/DATA-SOURCES.md)
      - name: Weekly defeatbeta dump (US prices + events — series + distillate)
        continue-on-error: true # prices are an enrichment, never a gate
        run: uv run crible import-prices defeatbeta --max-age-days 6

      # daily worldwide snapshot: fresh closes for listings no dump covers +
      # the numeric cap census (data/caps/) the top-10k ranking consumes.
      # Quote-only: the column-aware merge keeps dump momentum intact.
      - name: Daily TradingView whole-market scan (quotes + cap census)
        id: tradingview
        continue-on-error: true # prices are an enrichment, never a gate
        run: uv run crible import-prices tradingview
      - name: Surface a swallowed TradingView failure
        if: ${{ steps.tradingview.outcome == 'failure' }}
        run: |
          echo "### ⚠️ TradingView scan failed — check the step log" >> "$GITHUB_STEP_SUMMARY"
          echo "The step is best-effort so the run stays green; the cap census keeps its last-good state." >> "$GITHUB_STEP_SUMMARY"

      - name: Bounded keyless refresh (crawl → ESEF → EDGAR bulk + FSDS → FX → prices → prune → compute)
        # deadline trimmed to 2h: the EDGAR bulk sweep (~10k US issuers from
        # one public-domain archive) takes the reclaimed time; ESEF cadence
        # raised — filings.xbrl.org is not budget-bound like Yahoo. --fetch-gleif
        # and --fetch-fx default on (audited-EU mapping + ECB *_eur columns);
        # --fsds-quarters backfills deep 'as-filed' US history (public domain).
        # --max-minutes 240 is the whole-run guard: enrichment stages yield
        # early so prune+compute+publish always fit before the 300-min job
        # timeout — a slow night ships a partial-but-published dataset.
        # --esef-limit 1500: filings.xbrl.org is not budget-bound like Yahoo
        # (~1,000-1,500 xbrl-json docs/hour); with freshness re-seeded from
        # raw, the sweep covers the ~8,850 matched EU listings in a handful
        # of nightlies, then settles to new-filings-only. The wall-clock
        # guard, not this count, is the real bound.
        run: uv run crible refresh --deadline 7200 --max-minutes 240 --esef-limit 1500 --edgar-bulk --fsds-quarters 2 --edinet-days 7

      - name: Export the static site artifacts (min-symbols gate)
        run: uv run crible export-site --out site-data --min-symbols 50

      - name: Publish the rolling data-latest release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/publish-data-release.sh

      - name: Summary
        run: |
          {
            echo "### Dataset refreshed"
            echo '```json'
            cat site-data/manifest.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ALERT-ONLY, runs AFTER the publish so it never blocks a release:
      # bump the top10k-coverage issue when the slice drops below the
      # thresholds. Ratchet plan: raise ~10 pts/month toward 90/95 as the
      # audited providers and the census pipeline fill the slice.
      - name: Top-10k coverage beacon (never blocks the publish)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run crible check-coverage --min-fundamentals 40 --min-priced 70 || \
            bash scripts/notify-workflow-failure.sh "refresh-data" \
              "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              top10k-coverage "Top-10k coverage below threshold"

      # a red nightly must never be silent: raise/bump the labeled issue
      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/notify-workflow-failure.sh "refresh-data" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
