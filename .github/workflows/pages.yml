# GitHub Pages — the hosted screener, the SPA built in static mode (DSL
# compiled in the browser, DuckDB-WASM over the published Parquet). Data comes
# from the site-data.tar.gz asset on the rolling data-latest release
# (maintained by refresh-data.yml); deploying without it just shows the
# "not published yet" state. Hash routing → no 404 fallback.

name: pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [refresh-data, import-prices]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# cancel-in-progress is SAFE here (unlike refresh-data): every pages build
# checks out HEAD and downloads the latest site-data.tar.gz, so the newest
# build is always the most complete — cancelling an older one loses nothing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm --prefix ui install --no-audit --no-fund

      - name: Build the SPA in static mode
        run: npm --prefix ui run build
        env:
          VITE_DATA_MODE: static
          VITE_BASE: /crible/

      - name: Attach the published data artifacts
        run: |
          mkdir -p ui/dist/data
          if curl -fsSL --retry 3 -o /tmp/site-data.tar.gz \
              "https://github.com/${{ github.repository }}/releases/download/data-latest/site-data.tar.gz"; then
            tar -xzf /tmp/site-data.tar.gz -C /tmp
            cp -R /tmp/site-data/. ui/dist/data/
            echo "attached $(ls /tmp/site-data | wc -l) data artifacts"
            # generation stamp in the run summary: which dataset this deploy ships
            {
              echo "### Dataset generation"
              echo '```json'
              python3 -c "import json; m=json.load(open('/tmp/site-data/manifest.json')); print(json.dumps({k: m.get(k) for k in ('schema','generated_at','snapshot_symbols','commit')}, indent=2))"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "no published dataset yet — the site will show 'not published yet'"
          fi
          touch ui/dist/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
