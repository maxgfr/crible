# GitHub Pages demo — the SPA built in static mode (DSL compiled in the
# browser, DuckDB-WASM over the published Parquet). Data comes from the
# demo-data branch maintained by refresh-data.yml; deploying without it just
# shows the "not published yet" state. Hash routing → no 404 fallback needed.

name: pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [refresh-data]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm --prefix ui install --no-audit --no-fund

      - name: Build the SPA in static demo mode
        run: npm --prefix ui run build
        env:
          VITE_DATA_MODE: static
          VITE_BASE: /crible/

      - name: Attach the demo data artifacts
        run: |
          mkdir -p ui/dist/data
          if git fetch origin demo-data; then
            git checkout FETCH_HEAD -- site-data
            cp -R site-data/. ui/dist/data/
            echo "attached $(ls site-data | wc -l) data artifacts"
          else
            echo "no demo-data branch yet — the demo will show 'not published yet'"
          fi
          touch ui/dist/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
