# Release on tag vX.Y.Z — multi-arch Docker image to GHCR (amd64 for the
# classic VPS path, arm64 for e.g. Hetzner CAX / Apple Silicon / Pi NAS),
# then a GitHub Release whose notes are the latest CHANGELOG section.
# Only GITHUB_TOKEN is used: the zero-key contract extends to CI.

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  release:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub Release from the CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk '/^## /{n++} n==1' CHANGELOG.md > /tmp/notes.md
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/notes.md
