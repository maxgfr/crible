# On-demand price refresh: pull the HuggingFace (US) dump AND a Stooq
# per-country stock dump — windowed OHLCV series + per-symbol distillate
# (ADR-0007) — recompute the snapshot with them, republish. The weekly HF pull
# already runs inside refresh-data; this dispatch exists to force one anytime
# and to add Stooq coverage.
# NOTE: use a per-country STOCK code (d_us/uk/jp/hk/pl/hu_txt) — d_world_txt is
# instruments only (no individual stocks) and imports nothing for the universe.
# Stooq is CAPTCHA-gated — `crible stooq-download` clears the proof-of-work +
# image captcha headlessly (SHA-256 hashcash + ddddocr OCR), so it runs here in
# CI. It stays best-effort (continue-on-error): prices are an enrichment, never
# a gate. Set the stooq_dataset input to empty to skip it.

name: import-prices

on:
  workflow_dispatch:
    inputs:
      stooq_dataset:
        description: "Stooq per-country STOCK code (d_hk_txt, d_jp_txt, d_uk_txt…; empty = skip Stooq)"
        default: d_hk_txt
        required: false

permissions:
  contents: write
  issues: write # the failure beacon opens/bumps a labeled issue

# Own group, deliberately NOT shared with refresh-data: GitHub cancels the
# older PENDING run when two queue in one group — on 2026-07-15 a queued
# import-prices dispatch (run 29393834241) silently evicted the pending
# scheduled nightly (run 29390743173, cancelled 3 s later). Separate groups
# mean the two can overlap; the publish is last-writer-wins per asset and
# the post-publish consistency check in publish-data-release.sh catches a
# mixed-generation release.
concurrency:
  group: import-prices

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CRIBLE_DATA_DIR: data
    steps:
      - uses: actions/checkout@v4

      - name: Restore last-good data from the data-latest release
        run: |
          curl -fsSL --retry 3 -o /tmp/crible-data.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/data-latest/crible-data.tar.gz"
          tar -xzf /tmp/crible-data.tar.gz

      # ddddocr (the captcha OCR) pulls opencv-python (not headless) → needs libGL.
      - name: Install the OpenGL runtime opencv needs
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --extra captcha

      - name: Import the HuggingFace price dump (US — series + distillate)
        run: uv run crible import-prices huggingface

      - name: Fetch the Stooq worldwide dump (proof-of-work + OCR captcha)
        if: ${{ inputs.stooq_dataset != '' }}
        continue-on-error: true # prices are an enrichment, never a gate
        run: |
          uv run crible stooq-download "${{ inputs.stooq_dataset }}" \
            --out "${RUNNER_TEMP}/stooq.zip" --import

      - name: Recompute the snapshot with the fresh quotes
        run: uv run crible compute

      - name: Export the static site artifacts (min-symbols gate)
        run: uv run crible export-site --out site-data --min-symbols 50

      - name: Publish the rolling data-latest release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/publish-data-release.sh

      # Pages redeploys automatically: pages.yml triggers on this workflow's
      # completion (workflow_run), same as the nightly refresh-data. No manual
      # `gh workflow run` here — that needs `actions: write` and 403'd on the
      # default token (it only holds `contents: write`).

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/notify-workflow-failure.sh "import-prices" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
